  <circle cx="850" cy="400" r="10" fill="#1a2430"/>
  <text x="80" y="120" font-family="Poppins, Arial, sans-serif" font-size="42" fill="#f8f4e3" letter-spacing="3">PRODUCTO</text>
  <text x="80" y="190" font-family="Playfair Display, Georgia, serif" font-size="78" fill="#ffffff">Marrano en pie</text>
