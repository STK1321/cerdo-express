<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Marrano en pie</title>
  <desc id="desc">Tarjeta visual para producto marrano en pie</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f3f61"/>
      <stop offset="100%" stop-color="#0f2134"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
